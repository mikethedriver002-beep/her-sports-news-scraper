name: Women's Sports News Scraper

on:
  schedule:
    # 7 AM ET
    - cron: "0 11 * * *"

    # 12 PM ET
    - cron: "0 16 * * *"

    # 5 PM ET
    - cron: "0 21 * * *"

  workflow_dispatch:

jobs:
  scrape-news:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run scraper
        run: python womens_sports_scraper.py

      - name: Commit updated CSV
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add womens_sports_articles.csv
          git commit -m "Update women's sports news scrape" || echo "No changes to commit"
          git push
