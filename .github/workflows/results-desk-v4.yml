name: Women's Sports Results Desk v4.1

on:
  push:
  workflow_dispatch:
  schedule:
    - cron: "15 11 * * *"
    - cron: "15 17 * * *"
    - cron: "15 23 * * *"

permissions:
  contents: write

concurrency:
  group: results-desk-v4-1-${{ github.ref }}
  cancel-in-progress: false

jobs:
  core-results:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Results Desk v4.1
        env:
          APISPORTS_KEY: ${{ secrets.APISPORTS_KEY }}
          HSD_TIMEZONE: America/New_York
          HSD_RESULTS_SOURCES: apisports,espn
          HSD_LOOKBACK_DAYS: "1"
          HSD_LOOKAHEAD_DAYS: "1"
        run: python generate_hsd_results_desk_v4.py

      - name: Generate dashboard
        run: python generate_results_dashboard_v4.py

      - name: Archive this run
        run: python archive_results_runs_v4.py

      - name: Upload run artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-desk-v4-1
          path: results_run_history/latest/

      - name: Commit updated results files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add source_observations.csv
          git add reconciled_events.csv
          git add today_results_board.csv
          git add today_womens_results.csv
          git add today_final_results.csv
          git add top_womens_results.csv
          git add manual_review_queue.csv
          git add source_health_report.csv
          git add results_graphics_queue.md
          git add daily_results_recommendations.md
          git add results_system_hub.md
          git add run_manifest.json
          git add results_dashboard/index.html
          git add latest_results_run_summary.md
          git add results_run_history/
          git commit -m "Update HSD Results Desk v4.1" || echo "No changes to commit"
          git push
