name: Her Sports Daily Results Desk Worker - Manual Only

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  manual-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          echo "Manual-only worker. Production runs should use Her Sports Daily Production Controller v3.0."
          if [ -f generate_hsd_results_desk_v4.py ]; then python generate_hsd_results_desk_v4.py; else echo "generate_hsd_results_desk_v4.py not present in this repo."; fi
