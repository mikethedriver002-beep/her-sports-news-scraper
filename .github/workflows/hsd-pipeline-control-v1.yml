name: Her Sports Daily Pipeline Control v1.4

on:
  workflow_dispatch:
    inputs:
      run_mode:
        description: "What should run?"
        required: true
        default: "full_pipeline"
        type: choice
        options:
          - full_pipeline
          - results_only
          - news_only
          - studio_only
          - asset_only
      publish:
        description: "Commit and push generated outputs?"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      strict_freshness:
        description: "Block packets without event_date?"
        required: true
        default: "1"
        type: choice
        options:
          - "1"
          - "0"
      max_result_age_hours:
        description: "Freshness window in hours"
        required: true
        default: "18"
        type: string
      continue_on_empty:
        description: "Debug only: continue if a stage produces zero/freshness-blocked rows?"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      review_artifact_size:
        description: "Review artifact size"
        required: true
        default: "lite"
        type: choice
        options:
          - "lite"
          - "full"
          - "both"

permissions:
  contents: write
  actions: read

concurrency:
  group: hsd-pipeline-control-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run-hsd-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 95

    env:
      HSD_RUN_MODE: ${{ github.event.inputs.run_mode || 'full_pipeline' }}
      HSD_PUBLISH_OUTPUTS: ${{ github.event.inputs.publish || 'true' }}
      HSD_CONTINUE_ON_EMPTY: ${{ github.event.inputs.continue_on_empty || 'false' }}
      HSD_STRICT_FRESHNESS_GATE: ${{ github.event.inputs.strict_freshness || '1' }}
      HSD_MAX_RESULT_FRESH_HOURS: ${{ github.event.inputs.max_result_age_hours || '18' }}
      HSD_STUDIO_REQUIRE_EVENT_DATE: ${{ github.event.inputs.strict_freshness || '1' }}
      HSD_STUDIO_MAX_RESULT_AGE_HOURS: ${{ github.event.inputs.max_result_age_hours || '18' }}
      HSD_NEWS_REQUIRE_EVENT_DATE: "true"
      HSD_NEWS_ENABLE_FETCH: "true"
      HSD_TIMEZONE: America/New_York
      HSD_RESULTS_SOURCES: apisports,espn
      HSD_REVIEW_ARTIFACT_SIZE: ${{ github.event.inputs.review_artifact_size || 'lite' }}
      HSD_PREVIEW_LOOKAHEAD_HOURS: "30"
      HSD_LOOKBACK_DAYS: "1"
      HSD_LOOKAHEAD_DAYS: "1"
      HSD_ASSET_RIGHTS_MODE: aggressive
      HSD_ASSET_DOWNLOAD: "1"
      HSD_PLAYER_IMAGES_REQUIRED: "1"
      HSD_PLAYER_IMAGE_FREE_SEARCH: "1"
      HSD_PLAYER_IMAGE_MAX_CANDIDATES: "8"
      APISPORTS_KEY: ${{ secrets.APISPORTS_KEY }}
      BING_SEARCH_API_KEY: ${{ secrets.BING_SEARCH_API_KEY }}
      SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies once
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-news-sync.txt ]; then pip install -r requirements-news-sync.txt; fi
          if [ -f requirements-asset-visual-qa.txt ]; then pip install -r requirements-asset-visual-qa.txt; fi

      - name: Show pipeline plan
        shell: bash
        run: |
          echo "Run mode: ${HSD_RUN_MODE}"
          echo "Publish outputs: ${HSD_PUBLISH_OUTPUTS}"
          echo "Strict freshness: ${HSD_STRICT_FRESHNESS_GATE}"
          echo "Max result age hours: ${HSD_MAX_RESULT_FRESH_HOURS}"
          echo "Continue on empty: ${HSD_CONTINUE_ON_EMPTY}"
          echo "Results sources: ${HSD_RESULTS_SOURCES}"
          echo "Review artifact size: ${HSD_REVIEW_ARTIFACT_SIZE}"

      - name: Run Results Desk stage
        if: env.HSD_RUN_MODE == 'full_pipeline' || env.HSD_RUN_MODE == 'results_only'
        shell: bash
        run: |
          set -euo pipefail
          python generate_hsd_results_desk_v4.py
          if [ -f generate_results_dashboard_v4.py ]; then python generate_results_dashboard_v4.py; fi
          if [ -f archive_results_runs_v4.py ]; then python archive_results_runs_v4.py; fi

      - name: Gate after Results Desk
        if: env.HSD_RUN_MODE == 'full_pipeline' || env.HSD_RUN_MODE == 'results_only'
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import csv, json, os, re
          from datetime import datetime, timezone
          from pathlib import Path
          max_hours = float(os.environ.get('HSD_MAX_RESULT_FRESH_HOURS','18'))
          now = datetime.now(timezone.utc)
          candidate_files = ['top_womens_results.csv','today_final_results.csv','today_womens_results.csv','reconciled_events.csv']
          date_keys = ['event_datetime','event_date','result_date','scheduled_datetime_local','scheduled_date_local','game_datetime','game_date','date_utc','date','played_at','completed_at']
          def clean(v): return re.sub(r'\s+',' ',str(v or '')).strip()
          def parse_dt(v):
              s=clean(v).replace('Z','+00:00')
              if not s: return None
              try:
                  dt=datetime.fromisoformat(s)
                  return dt if dt.tzinfo else dt.replace(tzinfo=timezone.utc)
              except Exception:
                  pass
              m=re.search(r'\b(20\d{2})-(\d{1,2})-(\d{1,2})\b',s)
              if m:
                  # Use noon UTC for date-only rows so yesterday morning posts do not get overblocked.
                  return datetime(int(m.group(1)), int(m.group(2)), int(m.group(3)), 12, 0, 0, tzinfo=timezone.utc)
              m=re.search(r'\b(\d{1,2})/(\d{1,2})/(20\d{2})\b',s)
              if m:
                  return datetime(int(m.group(3)), int(m.group(1)), int(m.group(2)), 12, 0, 0, tzinfo=timezone.utc)
              return None
          rows=[]
          for fname in candidate_files:
              p=Path(fname)
              if not p.exists():
                  continue
              try:
                  with p.open(newline='', encoding='utf-8', errors='replace') as f:
                      for r in csv.DictReader(f):
                          r['_source_file']=fname
                          rows.append(r)
              except Exception:
                  continue
          checked=[]; fresh=[]; stale=[]; missing=[]
          for r in rows:
              dt=None; src=''
              for k in date_keys:
                  dt=parse_dt(r.get(k))
                  if dt:
                      src=k; break
              age=''
              status='missing_event_date'
              if dt:
                  age=max(0.0, (now-dt).total_seconds()/3600.0)
                  status='fresh' if age <= max_hours else 'stale'
              out={
                  'source_file': r.get('_source_file',''),
                  'headline': clean(r.get('graphics_headline') or r.get('headline') or r.get('matchup') or r.get('event_name')),
                  'event_date': dt.date().isoformat() if dt else '',
                  'event_age_hours': f'{age:.1f}' if isinstance(age,float) else '',
                  'status': status,
                  'date_source': src,
              }
              checked.append(out)
              if status=='fresh': fresh.append(out)
              elif status=='stale': stale.append(out)
              else: missing.append(out)
          with open('results_freshness_gate.csv','w',newline='',encoding='utf-8') as f:
              fields=['source_file','headline','event_date','event_age_hours','status','date_source']
              w=csv.DictWriter(f,fieldnames=fields); w.writeheader(); w.writerows(checked)
          lines=['# HSD Results Freshness Gate v1.3','',f'Generated: {now.isoformat()}','',f'- result rows checked: {len(checked)}',f'- fresh rows: {len(fresh)}',f'- stale rows: {len(stale)}',f'- missing event date rows: {len(missing)}',f'- max result age hours: {max_hours}','']
          if fresh:
              lines += ['## Fresh rows',''] + [f"- {x['headline']} | {x['event_date']} | {x['event_age_hours']}h | {x['source_file']}" for x in fresh[:20]] + ['']
          if stale:
              lines += ['## Stale rows',''] + [f"- {x['headline']} | {x['event_date']} | {x['event_age_hours']}h | {x['source_file']}" for x in stale[:20]] + ['']
          if missing:
              lines += ['## Missing event date rows',''] + [f"- {x['headline']} | {x['source_file']}" for x in missing[:20]] + ['']
          Path('results_freshness_report.md').write_text('\n'.join(lines),encoding='utf-8')
          Path('results_freshness_manifest.json').write_text(json.dumps({'checked':len(checked),'fresh':len(fresh),'stale':len(stale),'missing_event_date':len(missing),'max_hours':max_hours},indent=2),encoding='utf-8')
          if not fresh:
              Path('pipeline_stop_reason.md').write_text('# HSD Pipeline Stop\n\nStopped after Results Desk because no fresh final result rows passed the freshness window.\n\nThis prevents News Sync, Studio Bridge, and Asset Visual QA from building graphics from stale results.\n\nCheck `results_freshness_report.md`, `top_womens_results.csv`, and `today_final_results.csv`.\n', encoding='utf-8')
              print('No fresh Results Desk rows passed freshness gate.')
              print('HSD_PIPELINE_STOPPED=true')
          else:
              print(f'Fresh Results Desk rows: {len(fresh)}')
          PY
          if grep -q "Stopped after Results Desk" pipeline_stop_reason.md 2>/dev/null; then
            echo "Pipeline stopped after Results Desk: no fresh results." >> "$GITHUB_STEP_SUMMARY"
            if [ "${HSD_CONTINUE_ON_EMPTY}" != "true" ]; then
              echo "HSD_PIPELINE_STOPPED=true" >> "$GITHUB_ENV"
              echo "HSD_PIPELINE_STOP_STAGE=results_desk" >> "$GITHUB_ENV"
            fi
          fi

      - name: Run News Sync stage
        if: (env.HSD_RUN_MODE == 'full_pipeline' || env.HSD_RUN_MODE == 'news_only') && env.HSD_PIPELINE_STOPPED != 'true'
        shell: bash
        run: |
          set -euo pipefail
          python generate_hsd_news_sync_v1.py
          if [ -f generate_news_dashboard_v1.py ]; then python generate_news_dashboard_v1.py; fi
          if [ -f archive_news_runs_v1.py ]; then python archive_news_runs_v1.py; fi

      - name: Gate after News Sync
        if: (env.HSD_RUN_MODE == 'full_pipeline' || env.HSD_RUN_MODE == 'news_only') && env.HSD_PIPELINE_STOPPED != 'true'
        shell: bash
        run: |
          set -euo pipefail
          rows=0
          if [ -f news_fact_packets.csv ]; then rows=$(( $(wc -l < news_fact_packets.csv) - 1 )); fi
          echo "News fact packet rows: $rows"
          if [ "$rows" -le 0 ]; then
            cat > pipeline_stop_reason.md <<'EOF'
          # HSD Pipeline Stop

          Stopped after News Sync because `news_fact_packets.csv` had zero rows.

          This prevents Studio Bridge and Asset Visual QA from reading stale committed bundle files.

          Check `news_setup_error.md` and `news_input_status_report.csv`.
          EOF
            echo "Pipeline stopped after News Sync: zero fact packets." >> "$GITHUB_STEP_SUMMARY"
            if [ "${HSD_CONTINUE_ON_EMPTY}" != "true" ]; then
              echo "HSD_PIPELINE_STOPPED=true" >> "$GITHUB_ENV"
              echo "HSD_PIPELINE_STOP_STAGE=news_sync" >> "$GITHUB_ENV"
            fi
          fi

      - name: Run Studio Bridge stage
        if: (env.HSD_RUN_MODE == 'full_pipeline' || env.HSD_RUN_MODE == 'studio_only') && env.HSD_PIPELINE_STOPPED != 'true'
        shell: bash
        run: |
          set -euo pipefail
          python generate_hsd_studio_bridge_v1.py
          if [ -f generate_hsd_studio_dashboard_v1.py ]; then python generate_hsd_studio_dashboard_v1.py; fi
          if [ -f archive_hsd_studio_runs_v1.py ]; then python archive_hsd_studio_runs_v1.py; fi

      - name: Build preview fallback if no fresh result bundles
        if: (env.HSD_RUN_MODE == 'full_pipeline' || env.HSD_RUN_MODE == 'studio_only') && env.HSD_PIPELINE_STOPPED != 'true'
        shell: bash
        run: |
          set -euo pipefail
          if [ -f generate_hsd_tonight_preview_bridge_v1.py ]; then
            python generate_hsd_tonight_preview_bridge_v1.py
          fi

      - name: Gate after Studio Bridge
        if: (env.HSD_RUN_MODE == 'full_pipeline' || env.HSD_RUN_MODE == 'studio_only') && env.HSD_PIPELINE_STOPPED != 'true'
        shell: bash
        run: |
          set -euo pipefail
          rows=0
          if [ -f studio_bundle_queue.csv ]; then rows=$(( $(wc -l < studio_bundle_queue.csv) - 1 )); fi
          echo "Studio bundle rows: $rows"
          if [ "$rows" -le 0 ]; then
            cat > pipeline_stop_reason.md <<'EOF'
          # HSD Pipeline Stop

          Stopped after Studio Bridge because `studio_bundle_queue.csv` had zero rows.

          Asset Visual QA was not run because it would otherwise package stale committed bundle files.

          Most likely causes:
          - News Sync rows were created but marked production_ready=No.
          - Event dates were still missing or outside the freshness window.
          - Studio Bridge filtered all rows before bundle creation.

          Check `news_fact_packets.csv`, `studio_fresh_packet_report.md`, and `studio_fresh_packet_gate.csv`.
          EOF
            echo "Pipeline stopped after Studio Bridge: zero bundle rows." >> "$GITHUB_STEP_SUMMARY"
            if [ "${HSD_CONTINUE_ON_EMPTY}" != "true" ]; then
              echo "HSD_PIPELINE_STOPPED=true" >> "$GITHUB_ENV"
              echo "HSD_PIPELINE_STOP_STAGE=studio_bridge" >> "$GITHUB_ENV"
            fi
          fi

      - name: Run Asset Visual QA stage
        if: (env.HSD_RUN_MODE == 'full_pipeline' || env.HSD_RUN_MODE == 'asset_only') && env.HSD_PIPELINE_STOPPED != 'true'
        shell: bash
        run: |
          set -euo pipefail
          python generate_hsd_asset_desk_v1.py
          python generate_hsd_player_image_assets_v1.py
          python generate_hsd_visual_upgrade_v2.py
          python generate_hsd_graphics_production_specs_v1.py
          python generate_hsd_graphics_language_pack_v1.py
          python generate_hsd_studio_freshness_gate_v1.py
          python generate_hsd_player_image_fit_gate_v1.py
          python generate_hsd_graphics_prompt_sanitizer_v1.py
          python generate_hsd_graphics_upload_pack_v1.py
          python generate_hsd_graphics_qa_v1.py
          python generate_hsd_rendered_slide_qa_v1.py
          python archive_hsd_asset_visual_qa_runs_v1.py

      - name: Build lite review artifact
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          python generate_hsd_pipeline_review_lite_v1.py || true

      - name: Upload lite pipeline review artifact
        uses: actions/upload-artifact@v4
        if: always() && (env.HSD_REVIEW_ARTIFACT_SIZE == 'lite' || env.HSD_REVIEW_ARTIFACT_SIZE == 'both')
        with:
          name: hsd-pipeline-control-v1-4-lite-review
          path: |
            hsd_pipeline_lite_review.zip
            hsd_pipeline_lite_review/

      - name: Upload full pipeline review artifact
        uses: actions/upload-artifact@v4
        if: always() && (env.HSD_REVIEW_ARTIFACT_SIZE == 'full' || env.HSD_REVIEW_ARTIFACT_SIZE == 'both')
        with:
          name: hsd-pipeline-control-v1-4-full-review
          path: |
            pipeline_stop_reason.md
            hsd_pipeline_lite_review.zip
            hsd_pipeline_lite_review/
            studio_preview_fallback_report.md
            results_freshness_report.md
            results_freshness_gate.csv
            results_freshness_manifest.json
            latest_results_run_summary.md
            results_run_history/latest/
            top_womens_results.csv
            today_final_results.csv
            today_womens_results.csv
            reconciled_events.csv
            source_observations.csv
            source_health_report.csv
            manual_review_queue.csv
            results_graphics_queue.md
            daily_results_recommendations.md
            wnba_box_score_summary.md
            results_system_hub.md
            latest_news_sync_run_summary.md
            latest_studio_run_summary.md
            latest_asset_visual_qa_run_summary.md
            hsd_chatgpt_review_packet.md
            00_hsd_chatgpt_review_packet.md
            chatgpt_review_pack/
            news_setup_error.md
            news_input_status_report.csv
            news_fact_packets.csv
            news_run_history/latest/
            studio_fresh_packet_report.md
            studio_fresh_packet_gate.csv
            studio_bundle_queue.csv
            studio_run_history/latest/
            asset_run_history/latest/
            graphics_chat_upload_pack_zips/
            graphics_upload_pack_status.csv
            graphics_chat_direct_handoff.md
            studio_freshness_report.md
            studio_freshness_gate.csv
            player_image_sourcing_report.md
            player_image_requirements.csv
            player_image_fit_report.md
            player_image_fit_gate.csv

      - name: Commit and push generated outputs once
        if: env.HSD_PUBLISH_OUTPUTS == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          FILES=(
            "pipeline_stop_reason.md" "studio_preview_fallback_report.md" "hsd_pipeline_lite_review.zip" "hsd_pipeline_lite_review" "results_freshness_report.md" "results_freshness_gate.csv" "results_freshness_manifest.json"
            "source_observations.csv" "reconciled_events.csv" "today_results_board.csv" "today_womens_results.csv" "today_final_results.csv" "top_womens_results.csv" "manual_review_queue.csv" "source_health_report.csv" "results_graphics_queue.md" "daily_results_recommendations.md" "wnba_box_score_audit.csv" "wnba_box_score_summary.md" "results_system_hub.md" "run_manifest.json" "results_dashboard" "latest_results_run_summary.md" "results_run_history"
            "news_input_status_report.csv" "news_setup_error.md" "news_candidate_queue.csv" "news_source_observations.csv" "news_fact_packets.csv" "news_brief_queue.md" "news_social_packets.md" "news_graphics_handoff.md" "news_daily_plan.md" "news_manual_review_queue.csv" "news_sync_hub.md" "news_sync_manifest.json" "news_dashboard" "latest_news_sync_run_summary.md" "news_run_history"
            "studio_fresh_packet_report.md" "studio_fresh_packet_gate.csv" "studio_command_center.md" "studio_graphics_queue.csv" "studio_bundle_queue.csv" "studio_bundle_packets.md" "studio_bundle_prompts.md" "studio_bundle_prompts_v2.md" "studio_bundle_caption_bank.md" "studio_top_graphic_packets.md" "studio_image_prompts.md" "studio_caption_bank.md" "studio_accuracy_checklist.csv" "studio_manual_review_graphics.csv" "studio_post_schedule.md" "studio_brand_config.json" "studio_graphics_sop.json" "studio_manifest.json" "studio_dashboard" "brand_assets" "latest_studio_run_summary.md" "studio_run_history"
            "asset_manifest.csv" "asset_manifest.json" "team_assets.csv" "team_assets.json" "player_assets.csv" "player_assets.json" "asset_rights_review.csv" "fact_warning_queue.csv" "player_image_requirements.csv" "player_image_candidates.csv" "player_image_sourcing_report.md" "approved_graphics_assets.csv" "approved_graphics_assets.json" "launch_integration_points.csv" "asset_source_seed_list.csv" "asset_candidates_review.md" "asset_desk_manifest.json" "brand_system" "studio_templates_v2" "studio_visual_upgrade_v2.md" "studio_render_manifest_v2.json" "visual_upgrade_manifest.json" "visual_upgrade_dashboard" "graphics_production_specs.json" "graphics_slide_blueprints.md" "graphics_qa_results.csv" "graphics_qa_report.md" "graphics_qa_manifest.json" "graphics_language_manifest.json" "graphics_copy_style_guide.md" "graphics_display_copy.csv" "graphics_banned_language.csv" "graphics_asset_usage_map.csv" "graphics_layout_blueprint.csv" "graphics_prompt_sanitizer_rules.md" "graphics_clean_prompts" "graphics_prompt_clean_report.md" "graphics_prompt_clean_manifest.json" "graphics_qa_dashboard" "graphics_chat_upload_pack" "graphics_chat_upload_pack_zips" "graphics_chat_upload_manifest.csv" "graphics_chat_upload_manifest.json" "graphics_upload_pack_status.csv" "graphics_upload_pack_status.json" "graphics_chat_upload_instructions.md" "graphics_chat_direct_handoff.md" "data/assets" "studio_freshness_gate.csv" "studio_stale_packet_queue.csv" "studio_freshness_report.md" "studio_freshness_manifest.json" "player_image_fit_gate.csv" "player_image_fit_report.md" "player_image_fit_manifest.json" "rendered_slide_qa.csv" "rendered_slide_qa_report.md" "rendered_slide_qa_manifest.json" "latest_asset_visual_qa_run_summary.md" "asset_run_history" "hsd_chatgpt_review_packet.md" "chatgpt_review_pack"
          )

          for f in "${FILES[@]}"; do
            if [ -e "$f" ]; then git add "$f"; fi
          done

          git commit -m "Update HSD Pipeline Control v1.4 outputs" || echo "No changes to commit"

          for attempt in 1 2 3; do
            echo "Push attempt $attempt"
            git pull --rebase --autostash origin main || true
            if git push origin HEAD:main; then
              echo "Push succeeded"
              exit 0
            fi
            sleep 5
          done
          echo "Push failed after 3 attempts"
          exit 1
